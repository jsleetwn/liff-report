<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
  <h1 id="msg">正在初始化 LINE 登入...</h1>

  <script>
    document.addEventListener("DOMContentLoaded", async () => {
      try {
        // 1. 初始化 LIFF
        await liff.init({
          liffId: "2009861344-Es7WRe6Q",
          withLoginOnExternalBrowser: true
        });

        // 2. 檢查是否已登入
        if (!liff.isLoggedIn()) {
          liff.login(); // 強制登入
          return;
        }

        // 3. 取得資料並傳送
        const profile = await liff.getProfile();
        const userName = profile.displayName;
        document.getElementById("msg").innerText = "哈囉 " + userName + "，傳送中...";
        
        await sendToGoogleDoc(userName);

      } catch (err) {
        document.getElementById("msg").innerText = "系統錯誤";
        console.error(err);
      }
    });

    async function sendToGoogleDoc(name) {
      // 記得更換成你的 GAS URL
      const scriptUrl = "https://script.google.com/macros/s/AKfycbz3W64Am5dL0oJvkeEZ24nasWS7wXeWBmjuAceWZinUOgwnPkmAxj2-d0DFY_8fcO1U/exec"; 
      
      try {
        await fetch(scriptUrl, {
          method: "POST",
          mode: "no-cors", 
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ name: name })
        });
        document.getElementById("msg").innerText = "✅ 資料已成功寫入 Google 文件！";
      } catch (err) {
        document.getElementById("msg").innerText = "❌ 寫入失敗";
        console.error(err);
      }
    }
  </script>
</body>
</html>
