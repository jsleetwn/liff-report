<script>
  const liffId = "2009861344-Es7WRe6Q";

  document.addEventListener("DOMContentLoaded", async () => {
    try {
      await liff.init({ liffId: liffId, withLoginOnExternalBrowser: true });
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }
      const profile = await liff.getProfile();
      document.getElementById("name").value = profile.displayName;
      
      document.getElementById("msg").innerText = "LINE 已連線";
      document.getElementById("form-ui").style.display = "block";
    } catch (err) {
      document.getElementById("msg").innerText = "載入失敗：" + err;
    }
  });

  async function handleSubmit() {
    const btn = document.getElementById("submit-btn");
    const msg = document.getElementById("msg");
    
    // 1. 取得資料
    const name = document.getElementById("name").value;
    const item = document.getElementById("item").value;
    const qty = document.getElementById("qty").value;
    const bad_qty = document.getElementById("bad_qty").value;
    const note = document.getElementById("note").value;

    if (!item || !qty) {
      alert("請填寫項目與數量！");
      return;
    }

    // 2. Google 表單設定 (修正網址格式與變數拼接)
   const formID = "1FAIpQLSdooSUe_bJo79xWO8vEQaxzCUvFfjAUXJaUf5G0N25jcG8fSg";
   const formUrl = `https://docs.google.com/forms/d/e/${formID}/formResponse`;

    const params = new URLSearchParams();
    params.append("entry.102247220", name);    
    params.append("entry.578700101", item);    
    params.append("entry.618712037", qty);     
    params.append("entry.355774018", bad_qty); 
    params.append("entry.314678293", note);    

    // 3. 執行提交
    btn.disabled = true;
    msg.innerText = "🚀 正在提交到 Google 表單...";

    try {
      await fetch(formUrl, {
        method: "POST",
        mode: "no-cors", // Google 表單必須設為 no-cors
        body: params
      });

      msg.innerText = "✅ 回報成功！";
      alert("資料已成功送出！");
      liff.closeWindow(); 
    } catch (err) {
      msg.innerText = "❌ 傳送出錯：" + err;
      btn.disabled = false;
      console.error(err);
    }
  }
</script>
